<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f1c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="АудиоГид">
<title>АудиоГид · AudioGuide</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{--bg:#0f0f1c;--bg2:#13131f;--surf:#1a1a2e;--surf2:#20203c;--surf3:#2a2a50;--gold:#d4a853;--gold2:#f0c96a;--golddim:rgba(212,168,83,.12);--red:#e05c5c;--green:#5ce08a;--txt:#ede8d8;--txt2:#a09880;--txt3:#5a546e;--r:14px;--ph:172px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--txt);display:flex;flex-direction:column;align-items:center;overflow:hidden;height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 40% at 15% 10%,rgba(212,168,83,.07) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 85% 90%,rgba(80,60,160,.08) 0%,transparent 60%)}
.app{position:relative;z-index:1;width:100%;max-width:480px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{flex-shrink:0;padding:44px 22px 14px;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid rgba(212,168,83,.12)}
.h-left .eyebrow{font-size:10px;letter-spacing:3.5px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.h-left h1{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;line-height:1}
.h-left h1 em{font-style:italic;color:var(--gold2)}
.h-right{display:flex;gap:8px;align-items:center}
.icon-btn{background:var(--surf);border:1px solid rgba(212,168,83,.2);border-radius:20px;padding:6px 12px;color:var(--gold2);font-family:'Jost',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .2s;letter-spacing:.5px;white-space:nowrap}
.icon-btn:hover{background:var(--surf2);border-color:var(--gold)}
.tabs{flex-shrink:0;display:flex;padding:0 22px;border-bottom:1px solid rgba(255,255,255,.05)}
.tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--txt3);font-family:'Jost',sans-serif;font-size:11px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;padding:11px 0;cursor:pointer;transition:all .2s}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold)}
main{flex:1;overflow-y:auto;padding:14px 22px;padding-bottom:calc(var(--ph) + 14px)}
main::-webkit-scrollbar{width:3px}
main::-webkit-scrollbar-thumb{background:rgba(212,168,83,.15);border-radius:2px}
.folder-card{background:var(--surf);border:1px solid rgba(255,255,255,.05);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.folder-card.open{border-color:rgba(212,168,83,.25)}
.folder-head{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer}
.f-arrow{font-size:9px;color:var(--txt3);transition:transform .2s;flex-shrink:0}
.folder-card.open>.folder-head>.f-arrow{transform:rotate(90deg)}
.folder-icon{font-size:20px;flex-shrink:0}
.folder-info{flex:1;min-width:0}
.folder-name{font-family:'Cormorant Garamond',serif;font-size:19px;font-style:italic;color:var(--txt);transition:color .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.folder-head:hover .folder-name{color:var(--gold2)}
.folder-meta{font-size:11px;color:var(--txt3);margin-top:1px}
.f-admin{display:flex;gap:4px;flex-shrink:0}
.folder-body{padding:0 12px 10px}
.day-card{margin-bottom:6px;border-radius:10px;overflow:hidden;background:var(--surf2)}
.day-head{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;transition:background .15s}
.day-head:hover{background:var(--surf3)}
.d-arrow{font-size:8px;color:var(--txt3);transition:transform .2s;flex-shrink:0}
.day-card.open .d-arrow{transform:rotate(90deg)}
.day-pill{background:rgba(212,168,83,.15);border:1px solid rgba(212,168,83,.25);border-radius:20px;padding:2px 10px;font-size:10px;letter-spacing:.5px;color:var(--gold);flex-shrink:0}
.day-name-el{flex:1;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-meta{font-size:10px;color:var(--txt3);flex-shrink:0}
.d-admin{display:flex;gap:3px;flex-shrink:0}
.track-list{padding:2px 10px 8px}
.track-item{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:3px;border:1px solid transparent}
.track-item:hover{background:var(--surf3)}
.track-item.playing{background:var(--surf3);border-color:rgba(212,168,83,.3)}
.t-num{font-size:11px;color:var(--txt3);width:20px;text-align:right;flex-shrink:0}
.track-item.playing .t-num{color:var(--gold)}
.t-thumb{width:30px;height:30px;border-radius:7px;background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:background .2s}
.track-item.playing .t-thumb{background:var(--gold)}
.t-name{flex:1;min-width:0;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-dur{font-size:11px;color:var(--txt3);flex-shrink:0}
.t-del{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:12px;padding:4px 5px;border-radius:5px;transition:all .15s;flex-shrink:0}
.t-del:hover{color:var(--red);background:rgba(224,92,92,.12)}
.eq{display:flex;align-items:flex-end;gap:2px;height:13px}
.eq span{width:2.5px;background:var(--bg);border-radius:2px;animation:eqA .7s ease-in-out infinite alternate}
.eq span:nth-child(2){animation-delay:.15s}
.eq span:nth-child(3){animation-delay:.3s}
@keyframes eqA{0%{height:3px}100%{height:12px}}
.sm-btn{width:26px;height:26px;border-radius:6px;background:transparent;border:none;color:var(--txt3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.sm-btn:hover{background:var(--surf3);color:var(--txt)}
.sm-btn.danger:hover{color:var(--red);background:rgba(224,92,92,.12)}
.empty{text-align:center;padding:60px 16px;color:var(--txt3)}
.empty-icon{font-size:50px;margin-bottom:16px;opacity:.3}
.empty h3{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--txt);margin-bottom:8px}
.empty p{font-size:13px;line-height:1.7}
.player{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(15,15,28,.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(212,168,83,.18);padding:14px 22px 32px;z-index:100}
.p-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.p-art{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--gold),#7a5000);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.p-info{flex:1;min-width:0}
.p-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-sub{font-size:11px;color:var(--txt3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-sub.on{color:var(--gold)}
.prog-wrap{margin-bottom:10px}
.prog-bar{width:100%;height:3px;background:rgba(255,255,255,.08);border-radius:2px;cursor:pointer;position:relative}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;width:0%;transition:width .1s linear;position:relative}
.prog-fill::after{content:'';position:absolute;right:-4px;top:-3px;width:9px;height:9px;background:var(--gold2);border-radius:50%;box-shadow:0 0 6px rgba(240,201,106,.5)}
.prog-times{display:flex;justify-content:space-between;font-size:10px;color:var(--txt3);margin-top:5px}
.controls{display:flex;align-items:center;justify-content:center;gap:22px}
.ctrl{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:20px;padding:6px;transition:all .15s;display:flex;align-items:center;justify-content:center}
.ctrl:hover{color:var(--txt);transform:scale(1.1)}
.ctrl.play{width:48px;height:48px;background:linear-gradient(135deg,var(--gold),#8b6010);border-radius:50%;color:#0f0f1c;font-size:20px}
.ctrl.play:hover{transform:scale(1.05);filter:brightness(1.1)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid rgba(212,168,83,.15);border-radius:20px 20px 0 0;padding:24px 22px 40px;width:100%;max-width:480px;transform:translateY(100%);transition:transform .25s cubic-bezier(.22,1,.36,1);max-height:85vh;overflow-y:auto}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:rgba(212,168,83,.15);border-radius:2px}
.overlay.show .modal{transform:translateY(0)}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:var(--gold2);margin-bottom:18px}
.modal label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
.modal input[type=text],.modal input[type=password]{width:100%;background:var(--surf);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 16px;color:var(--txt);font-family:'Jost',sans-serif;font-size:14px;outline:none;transition:border-color .2s;margin-bottom:16px}
.modal input:focus{border-color:var(--gold)}
.modal input::placeholder{color:var(--txt3)}
.modal-row{display:flex;gap:10px;margin-top:4px}
.btn{flex:1;padding:13px;border-radius:11px;border:none;font-family:'Jost',sans-serif;font-size:13px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--gold),#8b6010);color:#0f0f1c}
.btn-primary:hover{filter:brightness(1.1)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:var(--surf);color:var(--txt2);border:1px solid rgba(255,255,255,.08)}
.btn-secondary:hover{background:var(--surf2)}
.btn-danger{background:rgba(224,92,92,.15);color:var(--red);border:1px solid rgba(224,92,92,.2)}
.btn-danger:hover{background:rgba(224,92,92,.25)}
.divider{height:1px;background:rgba(255,255,255,.06);margin:16px 0}
.admin-badge{background:rgba(212,168,83,.15);border:1px solid rgba(212,168,83,.3);border-radius:20px;padding:3px 10px;font-size:10px;color:var(--gold);letter-spacing:1px}
.upload-zone{border:2px dashed rgba(212,168,83,.25);border-radius:var(--r);padding:28px;text-align:center;cursor:pointer;margin-bottom:14px;transition:all .2s}
.upload-zone:hover{border-color:var(--gold);background:var(--golddim)}
.file-queue{margin:10px 0 14px}
.fq-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.fq-item:last-child{border-bottom:none}
.fq-num{font-size:12px;color:var(--txt3);width:20px;text-align:right;flex-shrink:0}
.fq-name{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fq-rm{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:13px;padding:4px}
.fq-rm:hover{color:var(--red)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(212,168,83,.3);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--surf2);border:1px solid rgba(212,168,83,.3);border-radius:30px;padding:10px 20px;font-size:13px;z-index:999;transition:transform .3s cubic-bezier(.22,1,.36,1);white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.chip{display:inline-block;background:var(--surf2);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;margin:3px;transition:all .15s}
.chip.selected{background:var(--golddim);border-color:rgba(212,168,83,.4);color:var(--gold2)}
.move-opt{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:background .15s;border:1px solid transparent;margin-bottom:4px}
.move-opt:hover{background:var(--surf2)}
.move-opt.selected{background:var(--surf2);border-color:rgba(212,168,83,.3)}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:12px;border-radius:11px;border:1px solid rgba(255,255,255,.15);background:var(--surf2);color:var(--txt);font-family:'Jost',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;margin-bottom:16px}
.google-btn:hover{background:var(--surf3);border-color:rgba(255,255,255,.25)}
.publish-bar{background:rgba(212,168,83,.1);border:1px solid rgba(212,168,83,.3);border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px}
.publish-bar span{font-size:12px;color:var(--gold2)}
.pub-btn{background:linear-gradient(135deg,var(--gold),#8b6010);color:#0f0f1c;border:none;border-radius:8px;padding:7px 14px;font-family:'Jost',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all .2s}
.pub-btn:hover{filter:brightness(1.1)}
.pub-btn:disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="h-left"><div class="eyebrow" id="eyebrow">Travel Audio</div><h1 id="appTitle">Аудио<em>Гид</em></h1></div>
    <div class="h-right">
      <button class="icon-btn" id="langBtn" onclick="toggleLang()">EN</button>
      <button class="icon-btn" onclick="openAdminModal()">&#9881;</button>
    </div>
  </header>
  <nav class="tabs">
    <button class="tab active" id="tabLib" onclick="showTab('lib')">Guides</button>
    <button class="tab" id="tabInfo" onclick="showTab('info')">About</button>
  </nav>
  <main id="mainContent"></main>
  <div class="player">
    <div class="p-row">
      <div class="p-art">&#128506;</div>
      <div class="p-info"><div class="p-title" id="pTitle">&#8212;</div><div class="p-sub" id="pSub">&#8212;</div></div>
    </div>
    <div class="prog-wrap">
      <div class="prog-bar" onclick="seekAudio(event)"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-times"><span id="tCur">0:00</span><span id="tTot">0:00</span></div>
    </div>
    <div class="controls">
      <button class="ctrl" onclick="skipTrack(-1)">&#9198;</button>
      <button class="ctrl play" id="playBtn" onclick="togglePlay()">&#9654;</button>
      <button class="ctrl" onclick="skipTrack(1)">&#9197;</button>
    </div>
  </div>
</div>

<!-- ADMIN MODAL -->
<div class="overlay" id="ovAdmin">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <div class="modal-title" style="margin-bottom:0" id="mAdminTitle">Admin Panel</div>
      <span class="admin-badge" id="adminBadge" style="display:none">ADMIN</span>
    </div>
    <div id="adminLoginSection">
      <p style="font-size:13px;color:var(--txt3);margin-bottom:16px;line-height:1.7" id="adminLoginDesc">Sign in with Google to manage content and publish changes to all users.</p>
      <button class="google-btn" onclick="startGoogleLogin()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        <span id="googleBtnLabel">Sign in with Google</span>
      </button>
      <div class="divider"></div>
      <label id="mPwdLabel">OR USE PASSWORD</label>
      <input type="password" id="pwdInput" onkeydown="if(event.key==='Enter')doPwdLogin()">
      <div id="pwdErr" style="color:var(--red);font-size:12px;margin-top:-10px;margin-bottom:14px;display:none"></div>
      <div class="modal-row">
        <button class="btn btn-secondary" id="mLoginCancel" onclick="closeOv('ovAdmin')">Cancel</button>
        <button class="btn btn-primary" id="mLoginOk" onclick="doPwdLogin()">Login</button>
      </div>
    </div>
    <div id="adminPanel" style="display:none">
      <div id="adminUserInfo" style="font-size:12px;color:var(--green);margin-bottom:14px"></div>
      <div class="publish-bar" id="publishBar" style="display:none">
        <span id="publishBarLabel">Unsaved changes</span>
        <button class="pub-btn" id="publishBtn" onclick="publishStructure()">&#9729; Publish</button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)" id="mFoldersLabel">FOLDERS</div>
        <button class="icon-btn" id="mNewFolder" onclick="openFolderModal(null)">+ New</button>
      </div>
      <div id="adminFolderList"></div>
      <div class="divider"></div>
      <label id="mDriveLabel">GOOGLE DRIVE FOLDER ID</label>
      <input type="text" id="driveFolderInput" placeholder="1aBcDeFg...">
      <div class="modal-row" style="margin-bottom:8px">
        <button class="btn btn-secondary" onclick="refreshLoad()">&#8635; Refresh</button>
        <button class="btn btn-primary" id="mDriveSave" onclick="saveDriveId()">Save</button>
      </div>
      <div id="driveStatus" style="font-size:12px;text-align:center;min-height:18px;margin-bottom:4px"></div>
      <div class="divider"></div>
      <div class="modal-row">
        <button class="btn btn-danger" id="mLogout" onclick="doLogout()">Logout</button>
        <button class="btn btn-secondary" id="mClose" onclick="closeOv('ovAdmin')">Close</button>
      </div>
    </div>
  </div>
</div>

<!-- FOLDER MODAL -->
<div class="overlay" id="ovFolder">
  <div class="modal">
    <div class="modal-title" id="mFolderTitle">New Folder</div>
    <label id="mFolderLabel">FOLDER NAME</label>
    <input type="text" id="folderNameInput" onkeydown="if(event.key==='Enter')saveFolder()">
    <div class="modal-row">
      <button class="btn btn-secondary" id="mFolderCancel" onclick="closeOv('ovFolder')">Cancel</button>
      <button class="btn btn-primary" id="mFolderSave" onclick="saveFolder()">Save</button>
    </div>
  </div>
</div>

<!-- DAY MODAL -->
<div class="overlay" id="ovDay">
  <div class="modal">
    <div class="modal-title" id="mDayTitle">New Section</div>
    <label id="mDayNumLabel">DAY NUMBER (optional)</label>
    <input type="text" id="dayNumInput" placeholder="1">
    <label id="mDayNameLabel">SECTION NAME</label>
    <input type="text" id="dayNameInput" placeholder="e.g. Colosseum Tour" onkeydown="if(event.key==='Enter')saveDay()">
    <div class="modal-row">
      <button class="btn btn-secondary" id="mDayCancel" onclick="closeOv('ovDay')">Cancel</button>
      <button class="btn btn-primary" id="mDaySave" onclick="saveDay()">Save</button>
    </div>
  </div>
</div>

<!-- UPLOAD MODAL -->
<div class="overlay" id="ovUpload">
  <div class="modal">
    <div class="modal-title" id="mUploadTitle">Upload Tracks</div>
    <div id="uploadTargetLabel" style="font-size:12px;color:var(--gold);margin-bottom:10px"></div>
    <div id="uploadDaySelector" style="margin-bottom:14px;display:none">
      <label id="mUploadDayLabel">ADD TO SECTION</label>
      <div id="uploadDayChips"></div>
    </div>
    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
      <div style="font-size:28px;margin-bottom:8px">&#127911;</div>
      <div style="font-size:14px;font-family:'Cormorant Garamond',serif" id="mUploadZoneLabel">Choose audio files</div>
      <div style="font-size:11px;color:var(--txt3);margin-top:4px">MP3, WAV, M4A, OGG</div>
    </div>
    <input type="file" id="fileInput" accept="audio/*" multiple style="display:none" onchange="onFilesChosen(event)">
    <div id="fileQueue" class="file-queue"></div>

function getList(fid,did){var f=folders.find(function(x){return x.id===fid;});if(!f)return[];if(did){var d=(f.days||[]).find(function(x){return x.id===did;});return d?(d.tracks||[]):[]}return f.tracks||[];}
function playTrack(fid,did,idx){
  var list=getList(fid,did);if(!list[idx])return;
  curFolderId=fid;curDayId=did;curIdx=idx;curPlaylist=list;
  var tr=list[idx];var f=folders.find(function(x){return x.id===fid;});var day=did?(f?(f.days||[]).find(function(x){return x.id===did;}):null):null;
  var getSrc=tr.blobId?getBlob(tr.blobId):Promise.resolve(null);
  getSrc.then(function(blob){
    var src=blob?URL.createObjectURL(blob):(tr.url||null);if(!src)return;
    audio.src=src;audio.play();isPlaying=true;
    document.getElementById('pTitle').textContent=tr.name;
    var sub=day?((day.num?(lang==='ru'?'День ':'Day ')+day.num+' \u2014 ':'')+day.name):(f?f.name:'');
    document.getElementById('pSub').textContent=sub;document.getElementById('pSub').className='p-sub on';
    renderLibrary();
  });
}
function togglePlay(){
  if(curIdx<0){var f=folders.find(function(x){return(x.days&&x.days.some(function(d){return d.tracks&&d.tracks.length;}))||(x.tracks&&x.tracks.length);});if(f){if(f.days&&f.days.length&&f.days[0].tracks&&f.days[0].tracks.length){playTrack(f.id,f.days[0].id,0);return;}if(f.tracks&&f.tracks.length){playTrack(f.id,null,0);return;}}}
  if(audio.paused){audio.play();isPlaying=true;}else{audio.pause();isPlaying=false;}
  document.getElementById('playBtn').innerHTML=isPlaying?'&#9646;&#9646;':'&#9654;';renderLibrary();
}
function skipTrack(dir){if(!curPlaylist.length)return;playTrack(curFolderId,curDayId,(curIdx+dir+curPlaylist.length)%curPlaylist.length);}
function seekAudio(e){if(!audio.duration)return;var r=e.currentTarget.getBoundingClientRect();audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;}
audio.addEventListener('timeupdate',function(){var p=audio.duration?(audio.currentTime/audio.duration*100):0;document.getElementById('progFill').style.width=p+'%';document.getElementById('tCur').textContent=fmt(audio.currentTime);document.getElementById('tTot').textContent=fmt(audio.duration);});
audio.addEventListener('ended',function(){skipTrack(1);});
audio.addEventListener('play',function(){isPlaying=true;document.getElementById('playBtn').innerHTML='&#9646;&#9646;';renderLibrary();});
audio.addEventListener('pause',function(){isPlaying=false;document.getElementById('playBtn').innerHTML='&#9654;';renderLibrary();});
function fmt(s){if(!s||isNaN(s))return'0:00';return Math.floor(s/60)+':'+(('0'+Math.floor(s%60)).slice(-2));}

// PUBLISH
function publishStructure(){
  if(!gToken){showToast(lang==='ru'?'Войдите через Google':'Sign in with Google');return;}
  var btn=document.getElementById('publishBtn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  var clean=folders.map(function(f){
    return{id:f.id,name:f.name,
      days:(f.days||[]).map(function(d){return{id:d.id,num:d.num,name:d.name,tracks:(d.tracks||[]).map(function(tr){return{id:tr.id,name:tr.name,url:tr.url||'',duration:tr.duration||''};})};}) ,
      tracks:(f.tracks||[]).map(function(tr){return{id:tr.id,name:tr.name,url:tr.url||'',duration:tr.duration||''};})
    };
  });
  var body=JSON.stringify(clean);
  var boundary='b'+Date.now();
  var meta=JSON.stringify(structureFileId?{name:STRUCTURE_FILE}:{name:STRUCTURE_FILE,parents:[DRIVE_FOLDER_ID]});
  var mp='--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+meta+'\r\n--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+body+'\r\n--'+boundary+'--';
  var url=structureFileId
    ?'https://www.googleapis.com/upload/drive/v3/files/'+structureFileId+'?uploadType=multipart'
    :'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
  var method=structureFileId?'PATCH':'POST';
  fetch(url,{method:method,headers:{'Authorization':'Bearer '+gToken,'Content-Type':'multipart/related; boundary='+boundary},body:mp})
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data.id)throw new Error('no id');
      structureFileId=data.id;
      return fetch('https://www.googleapis.com/drive/v3/files/'+data.id+'/permissions',{method:'POST',headers:{'Authorization':'Bearer '+gToken,'Content-Type':'application/json'},body:JSON.stringify({role:'reader',type:'anyone'})});
    })
    .then(function(){hasChanges=false;updatePublishBar();btn.innerHTML=t('publishBtn');btn.disabled=false;showToast(t('publishOk'));})
    .catch(function(e){console.error(e);btn.innerHTML=t('publishBtn');btn.disabled=false;showToast(t('publishErr'));});
}

// LOAD STRUCTURE
function loadStructure(){
  var key=DRIVE_API_KEY,fid=DRIVE_FOLDER_ID;
  return fetch('https://www.googleapis.com/drive/v3/files?q=%27'+fid+'%27+in+parents+and+name%3D%27'+STRUCTURE_FILE+'%27+and+trashed%3Dfalse&fields=files(id)&key='+key)
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data.files||!data.files.length)return null;
      structureFileId=data.files[0].id;
      return fetch('https://www.googleapis.com/drive/v3/files/'+structureFileId+'?alt=media&key='+key);
    })
    .then(function(r){return r?r.json():null;})
    .then(function(data){
      if(!data||!Array.isArray(data))return;
      var openF={},openD={};
      folders.forEach(function(f){openF[f.id]=f._open;(f.days||[]).forEach(function(d){openD[d.id]=d._open;});});
      folders=data.map(function(f){return{id:f.id,name:f.name,_open:openF[f.id]||false,days:(f.days||[]).map(function(d){return{id:d.id,num:d.num,name:d.name,_open:openD[d.id]||false,tracks:d.tracks||[]};}),tracks:f.tracks||[]};});
    })
    .catch(function(e){console.error('Load error',e);});
}

  var st=document.getElementById('driveStatus');

  loadStructure().then(function(){st.textContent=t('driveOk');st.style.color='var(--green)';renderLibrary();renderAdminFolderList();}).catch(function(){st.textContent=t('driveErr');st.style.color='var(--red)';});
}

function saveDriveId(){
  DRIVE_FOLDER_ID=document.getElementById('driveFolderInput').value.trim();
  localStorage.setItem('ag_drive_folder',DRIVE_FOLDER_ID);
  structureFileId=null;refreshLoad();
}

function renderAdminFolderList(){
  var el=document.getElementById('adminFolderList');
  if(!folders.length){el.innerHTML='<div style="font-size:13px;color:var(--txt3);padding:4px 0">'+t('noFolders')+'</div>';return;}
  el.innerHTML=folders.map(function(f){var tc=(f.tracks||[]).length+(f.days||[]).reduce(function(s,d){return s+(d.tracks||[]).length;},0);return'<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)"><span>&#128193;</span><span style="flex:1;font-size:13px">'+esc(f.name)+'</span><span style="font-size:11px;color:var(--txt3)">'+(f.days||[]).length+'s &middot; '+trCount(tc)+'</span><button class="sm-btn" onclick="openUploadModal(\''+f.id+'\',null);closeOv(\'ovAdmin\')">&#65291;</button><button class="sm-btn" onclick="openFolderModal(\''+f.id+'\');closeOv(\'ovAdmin\')">&#9999;</button><button class="sm-btn danger" onclick="deleteFolder(\''+f.id+'\');renderAdminFolderList()">&#10005;</button></div>';}).join('');
}

// FOLDERS
function openFolderModal(id){editingFolderId=id;document.getElementById('mFolderTitle').textContent=id?t('folderTitleEdit'):t('folderTitleNew');var f=id?folders.find(function(x){return x.id===id;}):null;document.getElementById('folderNameInput').value=f?f.name:'';openOv('ovFolder');setTimeout(function(){document.getElementById('folderNameInput').focus();},300);}
function saveFolder(){var name=document.getElementById('folderNameInput').value.trim();if(!name)return;if(editingFolderId){var f=folders.find(function(x){return x.id===editingFolderId;});if(f)f.name=name;}else folders.push({id:uid(),name:name,days:[],tracks:[],_open:false});closeOv('ovFolder');showToast(t('toastSaved'));markChanged();renderLibrary();renderAdminFolderList();}
function deleteFolder(id){if(!confirm(lang==='ru'?'Удалить папку?':'Delete folder?'))return;var i=folders.findIndex(function(x){return x.id===id;});if(i>=0)folders.splice(i,1);showToast(t('toastDeleted'));markChanged();renderLibrary();renderAdminFolderList();}

// DAYS
function openDayModal(fid,did){editingDayFolderId=fid;editingDayId=did;document.getElementById('mDayTitle').textContent=did?t('dayTitleEdit'):t('dayTitleNew');var f=folders.find(function(x){return x.id===fid;});var d=did&&f?(f.days||[]).find(function(x){return x.id===did;}):null;document.getElementById('dayNumInput').value=d?(d.num||''):'';document.getElementById('dayNameInput').value=d?d.name:'';openOv('ovDay');setTimeout(function(){document.getElementById('dayNameInput').focus();},300);}
function saveDay(){var num=document.getElementById('dayNumInput').value.trim();var name=document.getElementById('dayNameInput').value.trim();if(!name)return;var f=folders.find(function(x){return x.id===editingDayFolderId;});if(!f)return;if(!f.days)f.days=[];if(editingDayId){var d=f.days.find(function(x){return x.id===editingDayId;});if(d){d.num=num;d.name=name;}}else f.days.push({id:uid(),num:num,name:name,tracks:[],_open:false});closeOv('ovDay');showToast(t('toastSaved'));markChanged();renderLibrary();}
function deleteDay(fid,did){if(!confirm(lang==='ru'?'Удалить раздел?':'Delete section?'))return;var f=folders.find(function(x){return x.id===fid;});if(!f)return;var i=(f.days||[]).findIndex(function(x){return x.id===did;});if(i>=0)f.days.splice(i,1);showToast(t('toastDeleted'));markChanged();renderLibrary();}

// UPLOAD
function openUploadModal(fid,did){uploadFolderId=fid;uploadDayId=did;pendingFiles=[];var f=folders.find(function(x){return x.id===fid;});document.getElementById('uploadTargetLabel').textContent='&#128193; '+(f?f.name:'');document.getElementById('fileQueue').innerHTML='';document.getElementById('uploadProg').style.display='none';document.getElementById('fileInput').value='';document.getElementById('mUploadConfirm').disabled=false;var days=f?(f.days||[]):[];var sel=document.getElementById('uploadDaySelector');var chips=document.getElementById('uploadDayChips');if(days.length){sel.style.display='block';var html='<div class="chip'+(did===null?' selected':'')+'" onclick="selectUploadDay(null,this)">'+t('noSection')+'</div>';days.forEach(function(d){var label=(d.num?(lang==='ru'?'День ':'Day ')+d.num+' \u2014 ':'')+d.name;html+='<div class="chip'+(did===d.id?' selected':'')+'" onclick="selectUploadDay(\''+d.id+'\',this)">'+esc(label)+'</div>';});chips.innerHTML=html;}else sel.style.display='none';openOv('ovUpload');}
function selectUploadDay(did,el){uploadDayId=did;document.querySelectorAll('#uploadDayChips .chip').forEach(function(c){c.classList.remove('selected');});el.classList.add('selected');}
function onFilesChosen(e){pendingFiles=Array.from(e.target.files);renderFileQueue();}
function renderFileQueue(){document.getElementById('fileQueue').innerHTML=pendingFiles.map(function(f,i){return'<div class="fq-item"><span class="fq-num">'+(i+1)+'</span><span class="fq-name">'+esc(f.name.replace(/\.[^.]+$/,''))+'</span><button class="fq-rm" onclick="pendingFiles.splice('+i+',1);renderFileQueue()">&#10005;</button></div>';}).join('');}
function confirmUpload(){
  if(!pendingFiles.length)return;
  var folder=folders.find(function(x){return x.id===uploadFolderId;});if(!folder)return;
  var ta;if(uploadDayId){var day=(folder.days||[]).find(function(x){return x.id===uploadDayId;});if(!day)return;if(!day.tracks)day.tracks=[];ta=day.tracks;}else{if(!folder.tracks)folder.tracks=[];ta=folder.tracks;}
  var prog=document.getElementById('uploadProg');prog.style.display='block';document.getElementById('mUploadConfirm').disabled=true;
  var i=0;
  function next(){if(i>=pendingFiles.length){prog.style.display='none';document.getElementById('mUploadConfirm').disabled=false;closeOv('ovUpload');showToast(t('toastUploaded'));markChanged();renderLibrary();renderAdminFolderList();return;}
    var file=pendingFiles[i];prog.innerHTML='<span class="spin"></span>'+t('uploading')+' '+(i+1)+'/'+pendingFiles.length+': '+esc(file.name);
    var bid=uid();saveBlob(bid,file).then(function(){return audioDur(file);}).then(function(dur){ta.push({id:uid(),blobId:bid,name:file.name.replace(/\.[^.]+$/,''),duration:fmt(dur)});i++;next();});}
  next();
}
function audioDur(f){return new Promise(function(res){var a=new Audio(),u=URL.createObjectURL(f);a.onloadedmetadata=function(){URL.revokeObjectURL(u);res(a.duration);};a.onerror=function(){res(0);};a.src=u;});}

// DELETE / MOVE
function deleteTrack(fid,did,tid){var f=folders.find(function(x){return x.id===fid;});if(!f)return;var arr=did?((f.days||[]).find(function(x){return x.id===did;})||{}).tracks||[]:f.tracks||[];var i=arr.findIndex(function(x){return x.id===tid;});if(i>=0){var tr=arr[i];if(tr.blobId)delBlob(tr.blobId);arr.splice(i,1);}showToast(t('toastDeleted'));markChanged();renderLibrary();}
function openMoveModal(fid,did,tid){var f=folders.find(function(x){return x.id===fid;});if(!f)return;var arr=did?((f.days||[]).find(function(x){return x.id===did;})||{}).tracks||[]:f.tracks||[];var tr=arr.find(function(x){return x.id===tid;});if(!tr)return;moveInfo={folderId:fid,fromDayId:did,trackId:tid};moveTarget=undefined;document.getElementById('moveTrackName').textContent='&#127911; '+tr.name;var days=f.days||[];var html='<div class="move-opt" onclick="selectMove(null,this)"><span>&#128194;</span><span>'+t('noSection')+'</span></div>';days.forEach(function(d){var label=(d.num?(lang==='ru'?'День ':'Day ')+d.num+' \u2014 ':'')+d.name;var cur=did===d.id?' <span style="font-size:10px;color:var(--txt3)">('+( lang==='ru'?'текущий':'current')+')</span>':'';html+='<div class="move-opt" onclick="selectMove(\''+d.id+'\',this)"><span>&#128197;</span><span>'+esc(label)+cur+'</span></div>';});document.getElementById('moveOptions').innerHTML=html;openOv('ovMove');}
function selectMove(did,el){moveTarget=did;document.querySelectorAll('#moveOptions .move-opt').forEach(function(e){e.classList.remove('selected');});el.classList.add('selected');}
function confirmMove(){if(moveTarget===undefined)return;var f=folders.find(function(x){return x.id===moveInfo.folderId;});if(!f)return;var srcArr=moveInfo.fromDayId?((f.days||[]).find(function(x){return x.id===moveInfo.fromDayId;})||{}).tracks||[]:f.tracks||[];var ti=srcArr.findIndex(function(x){return x.id===moveInfo.trackId;});if(ti<0)return;var tr=srcArr.splice(ti,1)[0];var dstArr;if(moveTarget){var dst=(f.days||[]).find(function(x){return x.id===moveTarget;});if(!dst)return;if(!dst.tracks)dst.tracks=[];dstArr=dst.tracks;}else{if(!f.tracks)f.tracks=[];dstArr=f.tracks;}dstArr.push(tr);closeOv('ovMove');showToast(t('toastMoved'));markChanged();renderLibrary();}

// UTILS
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function openOv(id){document.getElementById(id).classList.add('show');}
function closeOv(id){document.getElementById(id).classList.remove('show');}
document.querySelectorAll('.overlay').forEach(function(ov){ov.addEventListener('click',function(e){if(e.target===ov)closeOv(ov.id);});});
var toastT;
function showToast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){el.classList.remove('show');},3000);}

// INIT
openDB().then(function(){
  applyLang();
  document.getElementById('mainContent').innerHTML='<div style="text-align:center;padding:40px;color:var(--txt3)"><span class="spin"></span> '+t('loading')+'</div>';
  loadStructure().then(function(){renderMain();}).catch(function(){renderMain();});
});
</script>
</body>
</html>
