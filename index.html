<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f1c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="АудиоГид">
<title>АудиоГид · AudioGuide</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f1c;--bg2:#13131f;--surf:#1a1a2e;--surf2:#20203c;--surf3:#2a2a50;
  --gold:#d4a853;--gold2:#f0c96a;--golddim:rgba(212,168,83,.12);
  --red:#e05c5c;--green:#5ce08a;
  --txt:#ede8d8;--txt2:#a09880;--txt3:#5a546e;
  --r:14px;--ph:170px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--txt);
  display:flex;flex-direction:column;align-items:center;overflow:hidden;height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 15% 10%,rgba(212,168,83,.07) 0%,transparent 60%),
             radial-gradient(ellipse 50% 60% at 85% 90%,rgba(80,60,160,.08) 0%,transparent 60%)}
.app{position:relative;z-index:1;width:100%;max-width:480px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
header{flex-shrink:0;padding:44px 22px 14px;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid rgba(212,168,83,.12)}
.h-left .eyebrow{font-size:10px;letter-spacing:3.5px;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.h-left h1{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;line-height:1}
.h-left h1 em{font-style:italic;color:var(--gold2)}
.h-right{display:flex;gap:8px;align-items:center}
.icon-btn{background:var(--surf);border:1px solid rgba(212,168,83,.2);border-radius:20px;padding:6px 12px;color:var(--gold2);font-family:'Jost',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .2s;letter-spacing:.5px;white-space:nowrap}
.icon-btn:hover{background:var(--surf2);border-color:var(--gold)}

/* TABS */
.tabs{flex-shrink:0;display:flex;padding:0 22px;border-bottom:1px solid rgba(255,255,255,.05)}
.tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--txt3);font-family:'Jost',sans-serif;font-size:11px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;padding:11px 0;cursor:pointer;transition:all .2s}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold)}

/* MAIN */
main{flex:1;overflow-y:auto;padding:14px 22px;padding-bottom:calc(var(--ph) + 14px)}
main::-webkit-scrollbar{width:3px}
main::-webkit-scrollbar-thumb{background:rgba(212,168,83,.15);border-radius:2px}

/* FOLDER CARD */
.folder-card{background:var(--surf);border:1px solid rgba(255,255,255,.05);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.folder-card.open{border-color:rgba(212,168,83,.25)}
.folder-head{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer}
.folder-arrow{font-size:9px;color:var(--txt3);transition:transform .2s;flex-shrink:0}
.folder-card.open>.folder-head>.folder-arrow{transform:rotate(90deg)}
.folder-icon{font-size:20px;flex-shrink:0}
.folder-info{flex:1;min-width:0}
.folder-name{font-family:'Cormorant Garamond',serif;font-size:19px;font-style:italic;color:var(--txt);transition:color .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.folder-head:hover .folder-name{color:var(--gold2)}
.folder-meta{font-size:11px;color:var(--txt3);margin-top:1px}
.folder-admin-btns{display:flex;gap:4px;flex-shrink:0}

/* DAY SECTION inside folder */
.folder-body{padding:0 12px 10px}
.day-section{margin-bottom:6px;border-radius:10px;overflow:hidden;background:var(--surf2)}
.day-head{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;transition:background .15s}
.day-head:hover{background:var(--surf3)}
.day-arrow{font-size:8px;color:var(--txt3);transition:transform .2s;flex-shrink:0}
.day-section.open .day-arrow{transform:rotate(90deg)}
.day-pill{background:rgba(212,168,83,.15);border:1px solid rgba(212,168,83,.25);border-radius:20px;padding:2px 10px;font-size:10px;letter-spacing:.5px;color:var(--gold);flex-shrink:0}
.day-name{flex:1;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-meta{font-size:10px;color:var(--txt3);flex-shrink:0}
.day-admin-btns{display:flex;gap:3px;flex-shrink:0}

/* TRACK LIST */
.track-list{padding:2px 10px 8px}
.track-item{display:flex;align-items:center;gap:10px;padding:8px 8px;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:3px;border:1px solid transparent}
.track-item:hover{background:var(--surf3)}
.track-item.playing{background:var(--surf3);border-color:rgba(212,168,83,.3)}
.track-num{font-size:11px;color:var(--txt3);width:20px;text-align:right;flex-shrink:0;font-variant-numeric:tabular-nums}
.track-item.playing .track-num{color:var(--gold)}
.track-thumb{width:30px;height:30px;border-radius:7px;background:var(--surf);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .2s}
.track-item.playing .track-thumb{background:var(--gold)}
.track-name{flex:1;min-width:0;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-dur{font-size:11px;color:var(--txt3);flex-shrink:0}
.track-del{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:12px;padding:4px 5px;border-radius:5px;transition:all .15s;flex-shrink:0}
.track-del:hover{color:var(--red);background:rgba(224,92,92,.12)}

/* Also show tracks directly in folder (no day) */
.folder-tracks{padding:0 12px 10px}

/* EQ */
.eq{display:flex;align-items:flex-end;gap:2px;height:13px}
.eq span{width:2.5px;background:var(--bg);border-radius:2px;animation:eqA .7s ease-in-out infinite alternate}
.eq span:nth-child(2){animation-delay:.15s}
.eq span:nth-child(3){animation-delay:.3s}
@keyframes eqA{0%{height:3px}100%{height:12px}}

/* BUTTONS */
.sm-btn{width:26px;height:26px;border-radius:6px;background:transparent;border:none;color:var(--txt3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.sm-btn:hover{background:var(--surf3);color:var(--txt)}
.sm-btn.danger:hover{color:var(--red);background:rgba(224,92,92,.12)}

/* EMPTY */
.empty{text-align:center;padding:60px 16px;color:var(--txt3)}
.empty-icon{font-size:50px;margin-bottom:16px;opacity:.3}
.empty h3{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--txt);margin-bottom:8px}
.empty p{font-size:13px;line-height:1.7}

/* PLAYER */
.player{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
  background:rgba(15,15,28,.97);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid rgba(212,168,83,.18);padding:14px 22px 32px;z-index:100}
.player-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.player-art{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--gold),#7a5000);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.player-info{flex:1;min-width:0}
.player-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-sub{font-size:11px;color:var(--txt3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-sub.on{color:var(--gold)}
.prog-wrap{margin-bottom:10px}
.prog-bar{width:100%;height:3px;background:rgba(255,255,255,.08);border-radius:2px;cursor:pointer;position:relative}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;width:0%;transition:width .1s linear;position:relative}
.prog-fill::after{content:'';position:absolute;right:-4px;top:-3px;width:9px;height:9px;background:var(--gold2);border-radius:50%;box-shadow:0 0 6px rgba(240,201,106,.5)}
.prog-times{display:flex;justify-content:space-between;font-size:10px;color:var(--txt3);margin-top:5px}
.controls{display:flex;align-items:center;justify-content:center;gap:22px}
.ctrl{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:20px;padding:6px;transition:all .15s;display:flex;align-items:center;justify-content:center}
.ctrl:hover{color:var(--txt);transform:scale(1.1)}
.ctrl.play{width:48px;height:48px;background:linear-gradient(135deg,var(--gold),#8b6010);border-radius:50%;color:#0f0f1c;font-size:20px}
.ctrl.play:hover{transform:scale(1.05);filter:brightness(1.1)}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid rgba(212,168,83,.15);border-radius:20px 20px 0 0;padding:24px 22px 40px;width:100%;max-width:480px;transform:translateY(100%);transition:transform .25s cubic-bezier(.22,1,.36,1);max-height:85vh;overflow-y:auto}
.modal::-webkit-scrollbar{width:3px}
.modal::-webkit-scrollbar-thumb{background:rgba(212,168,83,.15);border-radius:2px}
.overlay.show .modal{transform:translateY(0)}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:var(--gold2);margin-bottom:18px}
.modal label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
.modal input[type=text],.modal input[type=password]{width:100%;background:var(--surf);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 16px;color:var(--txt);font-family:'Jost',sans-serif;font-size:14px;outline:none;transition:border-color .2s;margin-bottom:16px}
.modal input:focus{border-color:var(--gold)}
.modal input::placeholder{color:var(--txt3)}
.modal-row{display:flex;gap:10px;margin-top:4px}
.btn{flex:1;padding:13px;border-radius:11px;border:none;font-family:'Jost',sans-serif;font-size:13px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--gold),#8b6010);color:#0f0f1c}
.btn-primary:hover{filter:brightness(1.1)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:var(--surf);color:var(--txt2);border:1px solid rgba(255,255,255,.08)}
.btn-secondary:hover{background:var(--surf2)}
.btn-danger{background:rgba(224,92,92,.15);color:var(--red);border:1px solid rgba(224,92,92,.2)}
.btn-danger:hover{background:rgba(224,92,92,.25)}
.divider{height:1px;background:rgba(255,255,255,.06);margin:16px 0}
.admin-badge{background:rgba(212,168,83,.15);border:1px solid rgba(212,168,83,.3);border-radius:20px;padding:3px 10px;font-size:10px;color:var(--gold);letter-spacing:1px}
.upload-zone{border:2px dashed rgba(212,168,83,.25);border-radius:var(--r);padding:28px;text-align:center;cursor:pointer;margin-bottom:14px;transition:all .2s}
.upload-zone:hover{border-color:var(--gold);background:var(--golddim)}
.file-queue{margin:10px 0 14px}
.fq-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.fq-item:last-child{border-bottom:none}
.fq-num{font-size:12px;color:var(--txt3);width:20px;text-align:right;flex-shrink:0}
.fq-name{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fq-rm{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:13px;padding:4px}
.fq-rm:hover{color:var(--red)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(212,168,83,.3);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--surf2);border:1px solid rgba(212,168,83,.3);border-radius:30px;padding:10px 20px;font-size:13px;z-index:999;transition:transform .3s cubic-bezier(.22,1,.36,1);white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.info-box{background:var(--surf);border:1px solid rgba(212,168,83,.15);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--txt3);line-height:1.7;margin-bottom:16px}
.info-box strong{color:var(--txt2)}

/* Move track modal */
.move-track-list{max-height:300px;overflow-y:auto;margin-bottom:14px}
.move-option{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:background .15s;border:1px solid transparent}
.move-option:hover{background:var(--surf2)}
.move-option.selected{background:var(--surf2);border-color:rgba(212,168,83,.3)}
.move-option-icon{font-size:16px;flex-shrink:0}
.move-option-name{font-size:13px;flex:1}
.move-option-sub{font-size:11px;color:var(--txt3)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="h-left">
      <div class="eyebrow" id="eyebrow">Travel Audio</div>
      <h1 id="appTitle">Аудио<em>Гид</em></h1>
    </div>
    <div class="h-right">
      <button class="icon-btn" onclick="toggleLang()" id="langBtn">EN</button>
      <button class="icon-btn" onclick="openAdminModal()">⚙</button>
    </div>
  </header>
  <nav class="tabs">
    <button class="tab active" id="tabLib" onclick="showTab('lib')"></button>
    <button class="tab" id="tabInfo" onclick="showTab('info')"></button>
  </nav>
  <main id="mainContent"></main>
  <div class="player">
    <div class="player-row">
      <div class="player-art">🗺️</div>
      <div class="player-info">
        <div class="player-title" id="pTitle">—</div>
        <div class="player-sub" id="pSub">—</div>
      </div>
    </div>
    <div class="prog-wrap">
      <div class="prog-bar" onclick="seekAudio(event)"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-times"><span id="tCur">0:00</span><span id="tTot">0:00</span></div>
    </div>
    <div class="controls">
      <button class="ctrl" onclick="skipTrack(-1)">⏮</button>
      <button class="ctrl play" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl" onclick="skipTrack(1)">⏭</button>
    </div>
  </div>
</div>

<!-- LOGIN -->
<div class="overlay" id="ovLogin">
  <div class="modal">
    <div class="modal-title" id="mLoginTitle">Admin Login</div>
    <label id="mLoginLabel">PASSWORD</label>
    <input type="password" id="loginInput" onkeydown="if(event.key==='Enter')doLogin()">
    <div id="loginErr" style="color:var(--red);font-size:12px;margin-top:-10px;margin-bottom:14px;display:none"></div>
    <div class="modal-row">
      <button class="btn btn-secondary" id="mLoginCancel" onclick="closeOv('ovLogin')">Cancel</button>
      <button class="btn btn-primary" id="mLoginOk" onclick="doLogin()">Login</button>
    </div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="overlay" id="ovAdmin">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
      <div class="modal-title" style="margin-bottom:0" id="mAdminTitle">Admin Panel</div>
      <span class="admin-badge">ADMIN</span>
    </div>
    <div class="info-box" id="driveInfoBox"></div>
    <label id="mDriveFolderLabel">GOOGLE DRIVE FOLDER ID</label>
    <input type="text" id="driveFolderInput">
    <label id="mDriveApiLabel">GOOGLE API KEY</label>
    <input type="text" id="driveApiInput">
    <div class="modal-row" style="margin-bottom:8px">
      <button class="btn btn-secondary" onclick="refreshDrive()">↻ Refresh</button>
      <button class="btn btn-primary" id="mDriveSave" onclick="saveDrive()">Save & Connect</button>
    </div>
    <div id="driveStatus" style="font-size:12px;text-align:center;margin-bottom:4px;min-height:18px"></div>
    <div class="divider"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)" id="mFoldersLabel">FOLDERS</div>
      <button class="icon-btn" id="mNewFolder" onclick="openFolderModal(null)">+ New</button>
    </div>
    <div id="adminFolderList"></div>
    <div class="divider"></div>
    <div class="modal-row">
      <button class="btn btn-danger" id="mLogout" onclick="doLogout()">Logout</button>
      <button class="btn btn-secondary" id="mClose" onclick="closeOv('ovAdmin')">Close</button>
    </div>
  </div>
</div>

<!-- FOLDER NAME MODAL -->
<div class="overlay" id="ovFolder">
  <div class="modal">
    <div class="modal-title" id="mFolderTitle">New Folder</div>
    <label id="mFolderLabel">FOLDER NAME</label>
    <input type="text" id="folderNameInput" onkeydown="if(event.key==='Enter')saveFolder()">
    <div class="modal-row">
      <button class="btn btn-secondary" onclick="closeOv('ovFolder')" id="mFolderCancel">Cancel</button>
      <button class="btn btn-primary" onclick="saveFolder()" id="mFolderSave">Save</button>
    </div>
  </div>
</div>

<!-- DAY/SECTION MODAL -->
<div class="overlay" id="ovDay">
  <div class="modal">
    <div class="modal-title" id="mDayTitle">New Section</div>
    <label id="mDayNumLabel">DAY NUMBER (optional)</label>
    <input type="text" id="dayNumInput" placeholder="1">
    <label id="mDayNameLabel">SECTION NAME</label>
    <input type="text" id="dayNameInput" placeholder="e.g. Colosseum & Forum" onkeydown="if(event.key==='Enter')saveDay()">
    <div class="modal-row">
      <button class="btn btn-secondary" onclick="closeOv('ovDay')" id="mDayCancel">Cancel</button>
      <button class="btn btn-primary" onclick="saveDay()" id="mDaySave">Save</button>
    </div>
  </div>
</div>

<!-- UPLOAD MODAL -->
<div class="overlay" id="ovUpload">
  <div class="modal">
    <div class="modal-title" id="mUploadTitle">Upload Tracks</div>
    <div id="uploadTargetLabel" style="font-size:12px;color:var(--gold);margin-bottom:6px"></div>

    <!-- Target day selector -->
    <div id="uploadDaySelector" style="margin-bottom:14px">
      <label id="mUploadDayLabel">ADD TO SECTION</label>
      <div id="uploadDayOptions" style="display:flex;flex-wrap:wrap;gap:6px"></div>
    </div>

    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
      <div style="font-size:28px;margin-bottom:8px">🎧</div>
      <div style="font-size:14px;font-family:'Cormorant Garamond',serif" id="mUploadZoneLabel">Choose audio files</div>
      <div style="font-size:11px;color:var(--txt3);margin-top:4px">MP3, WAV, M4A, OGG</div>
    </div>
    <input type="file" id="fileInput" accept="audio/*" multiple style="display:none" onchange="onFilesChosen(event)">
    <div id="fileQueue" class="file-queue"></div>
    <div id="uploadProg" style="display:none;font-size:12px;color:var(--txt3);margin-bottom:10px"></div>
    <div class="modal-row">
      <button class="btn btn-secondary" onclick="closeOv('ovUpload')" id="mUploadCancel">Cancel</button>
      <button class="btn btn-primary" onclick="confirmUpload()" id="mUploadConfirm">Upload</button>
    </div>
  </div>
</div>

<!-- MOVE TRACK MODAL -->
<div class="overlay" id="ovMove">
  <div class="modal">
    <div class="modal-title" id="mMoveTitle">Move Track</div>
    <div id="moveTrackName" style="font-size:13px;color:var(--txt2);margin-bottom:14px"></div>
    <label id="mMoveLabel">MOVE TO SECTION</label>
    <div class="move-track-list" id="moveOptions"></div>
    <div class="modal-row">
      <button class="btn btn-secondary" onclick="closeOv('ovMove')" id="mMoveCancel">Cancel</button>
      <button class="btn btn-primary" onclick="confirmMove()" id="mMoveConfirm">Move</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<audio id="audio"></audio>

<script>
// ═══ STATE ════════════════════════════════════════════════════
let lang = localStorage.getItem('ag_lang') || 'ru';
let isAdmin = false;
let currentTab = 'lib';

// Playback
let curFolderId = null, curDayId = null, curIdx = -1;
let curPlaylist = []; // flat array of tracks currently playing
let isPlaying = false;

// Data
// folders: [{id, name, days:[{id,num,name,tracks:[{id,name,blobId?,url?,duration}]}], tracks:[], _open, driveSourced?}]
let folders = JSON.parse(localStorage.getItem('ag_folders') || '[]');
const DEFAULT_DRIVE = { folderId: '1CMJ1JtSTqE9A_TXSChZOG-rf6vFl954X', apiKey: 'AIzaSyBsZbfhcO8orXPsZDJ1jZ_xyRmpu-0FT70' };
let driveConfig = Object.assign({}, DEFAULT_DRIVE, JSON.parse(localStorage.getItem('ag_drive') || '{}'));

// Modal state
let editingFolderId = null;
let editingDayId = null, editingDayFolderId = null;
let uploadFolderId = null, uploadDayId = null;
let pendingFiles = [];

// ═══ IDB ══════════════════════════════════════════════════════
let db;
async function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('AudioGuideDB',2);
    r.onupgradeneeded=e=>{ if(!e.target.result.objectStoreNames.contains('files')) e.target.result.createObjectStore('files',{keyPath:'id'}); };
    r.onsuccess=e=>{db=e.target.result;res()};r.onerror=rej;
  });
}
const saveBlob=(id,blob)=>new Promise((res,rej)=>{const tx=db.transaction('files','readwrite');tx.objectStore('files').put({id,blob});tx.oncomplete=res;tx.onerror=rej;});
const getBlob=id=>new Promise((res,rej)=>{const tx=db.transaction('files','readonly');const r=tx.objectStore('files').get(id);r.onsuccess=e=>res(e.target.result?.blob);r.onerror=rej;});
const delBlob=id=>new Promise(res=>{const tx=db.transaction('files','readwrite');tx.objectStore('files').delete(id);tx.oncomplete=res;});

function trCount(n){

  return n+' '+t('trM');
}

// ═══ LIBRARY RENDER ═══════════════════════════════════════════
function renderLibrary(){
  const el=document.getElementById('mainContent');
  if(!folders.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">🗺️</div><h3>${t('noFolders')}</h3><p>${t('noFoldersDesc')}</p></div>`;
    return;
  }
  let html='';
  folders.forEach(folder=>{
    const open=folder._open;
    const days=folder.days||[];
    const rootTracks=folder.tracks||[];
    const totalTracks=days.reduce((s,d)=>s+(d.tracks||[]).length,0)+rootTracks.length;
    html+=`<div class="folder-card ${open?'open':''}">
      <div class="folder-head" onclick="toggleFolder('${folder.id}')">
        <span class="folder-arrow">▶</span>
        <span class="folder-icon">📁</span>
        <div class="folder-info">
          <div class="folder-name">${esc(folder.name)}</div>
          <div class="folder-meta">${days.length?days.length+' '+(lang==='ru'?'разд.':'sec.')+' · ':''} ${trCount(totalTracks)}</div>
        </div>
        ${isAdmin?`<div class="folder-admin-btns" onclick="event.stopPropagation()">
          <button class="sm-btn" title="${t('addDay')}" onclick="openDayModal('${folder.id}',null)">📅</button>
          <button class="sm-btn" title="Upload" onclick="openUploadModal('${folder.id}',null)">＋</button>
          <button class="sm-btn" title="Rename" onclick="openFolderModal('${folder.id}')">✎</button>
          <button class="sm-btn danger" title="Delete" onclick="deleteFolder('${folder.id}')">✕</button>
        </div>`:''}
      </div>`;

    if(open){
      html+=`<div class="folder-body">`;

      // Render day sections
      days.forEach(day=>{
        const dayOpen=day._open;
        const tracks=day.tracks||[];
        const label=day.num?(lang==='ru'?`День ${day.num}`:`Day ${day.num}`):'';
        html+=`<div class="day-section ${dayOpen?'open':''}">
          <div class="day-head" onclick="toggleDay('${folder.id}','${day.id}')">
            <span class="day-arrow">▶</span>
            ${label?`<span class="day-pill">${label}</span>`:''}
            <span class="day-name">${esc(day.name)}</span>
            <span class="day-meta">${trCount(tracks.length)}</span>
            ${isAdmin?`<div class="day-admin-btns" onclick="event.stopPropagation()">
              <button class="sm-btn" onclick="openUploadModal('${folder.id}','${day.id}')">＋</button>
              <button class="sm-btn" onclick="openDayModal('${folder.id}','${day.id}')">✎</button>
              <button class="sm-btn danger" onclick="deleteDay('${folder.id}','${day.id}')">✕</button>
            </div>`:''}
          </div>`;
        if(dayOpen){
          html+=`<div class="track-list">`;
          if(!tracks.length){
            html+=`<div style="padding:6px 4px;font-size:12px;color:var(--txt3)">${t('noTracks')}</div>`;
          } else {
            tracks.forEach((tr,i)=>{
              const playing=curFolderId===folder.id&&curDayId===day.id&&curIdx===i&&isPlaying;
              html+=renderTrackItem(tr,i,playing,folder.id,day.id);
            });
          }
          html+=`</div>`;
        }
        html+=`</div>`;
      });

      // Root-level tracks (no section)
      if(rootTracks.length){
        if(days.length){
          html+=`<div style="font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);padding:8px 4px 4px">${t('noSection')}</div>`;
        }
        html+=`<div class="track-list">`;
        rootTracks.forEach((tr,i)=>{
          const playing=curFolderId===folder.id&&curDayId===null&&curIdx===i&&isPlaying;
          html+=renderTrackItem(tr,i,playing,folder.id,null);
        });
        html+=`</div>`;
      }

      html+=`</div>`; // folder-body
    }
    html+=`</div>`;
  });
  el.innerHTML=html;
}

    <div class="track-thumb">${playing?'<div class="eq"><span></span><span></span><span></span></div>':'🎧'}</div>
    <span class="track-name">${esc(tr.name)}</span>
    <span class="track-dur">${tr.duration||''}</span>
    ${isAdmin?`<button class="track-del" onclick="event.stopPropagation();openMoveModal('${folderId}',${dayParam},'${tr.id}')" title="Move">⇄</button>
               <button class="track-del" onclick="event.stopPropagation();deleteTrack('${folderId}',${dayParam},'${tr.id}')">✕</button>`:''}
  </div>`;
}

// ═══ AUDIO ════════════════════════════════════════════════════
const audio=document.getElementById('audio');

function getTrackList(folderId,dayId){
  const folder=folders.find(f=>f.id===folderId);
  if(!folder)return[];
  if(dayId){ const day=(folder.days||[]).find(d=>d.id===dayId); return day?day.tracks||[]:[];}
  return folder.tracks||[];
}

async function playTrack(folderId,dayId,idx){
  const list=getTrackList(folderId,dayId);
  if(!list[idx])return;
  curFolderId=folderId;curDayId=dayId;curIdx=idx;curPlaylist=list;
  const tr=list[idx];
  let src;
  if(tr.blobId){const b=await getBlob(tr.blobId);if(b)src=URL.createObjectURL(b);}
  else if(tr.url)src=tr.url;
  if(!src)return;
  audio.src=src;audio.play();isPlaying=true;
  const folder=folders.find(f=>f.id===folderId);
  const day=dayId?(folder?.days||[]).find(d=>d.id===dayId):null;
  document.getElementById('pTitle').textContent=tr.name;
  const sub=day?(day.num?(lang==='ru'?`День ${day.num} · `:` Day ${day.num} · `):'')+day.name:folder?.name||'';
  document.getElementById('pSub').textContent='📁 '+sub;
  document.getElementById('pSub').className='player-sub on';
  renderLibrary();
}

function togglePlay(){
  if(curIdx<0){
    const f=folders.find(x=>(x.days&&x.days.some(d=>d.tracks&&d.tracks.length))||(x.tracks&&x.tracks.length));
    if(f){
      if(f.days&&f.days.length&&f.days[0].tracks&&f.days[0].tracks.length){playTrack(f.id,f.days[0].id,0);return;}
      if(f.tracks&&f.tracks.length){playTrack(f.id,null,0);return;}
    }
  }
  if(audio.paused){audio.play();isPlaying=true;}else{audio.pause();isPlaying=false;}
  document.getElementById('playBtn').textContent=isPlaying?'⏸':'▶';
  renderLibrary();
}

function skipTrack(dir){
  if(!curPlaylist.length)return;
  playTrack(curFolderId,curDayId,(curIdx+dir+curPlaylist.length)%curPlaylist.length);
}

function seekAudio(e){ if(!audio.duration)return; const r=e.currentTarget.getBoundingClientRect(); audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration; }

audio.addEventListener('timeupdate',()=>{
  const p=audio.duration?(audio.currentTime/audio.duration*100):0;
  document.getElementById('progFill').style.width=p+'%';
  document.getElementById('tCur').textContent=fmt(audio.currentTime);
  document.getElementById('tTot').textContent=fmt(audio.duration);
});
audio.addEventListener('ended',()=>skipTrack(1));
audio.addEventListener('play',()=>{isPlaying=true;document.getElementById('playBtn').textContent='⏸';renderLibrary();});
audio.addEventListener('pause',()=>{isPlaying=false;document.getElementById('playBtn').textContent='▶';renderLibrary();});

function fmt(s){if(!s||isNaN(s))return'0:00';return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;}

// ═══ DRIVE ════════════════════════════════════════════════════
async function saveDrive(){
  driveConfig.folderId=document.getElementById('driveFolderInput').value.trim();
  driveConfig.apiKey=document.getElementById('driveApiInput').value.trim();
  localStorage.setItem('ag_drive',JSON.stringify(driveConfig));
  const st=document.getElementById('driveStatus');
  st.innerHTML=`<span class="spin"></span> Connecting...`;st.style.color='var(--txt3)';
  const ok=await syncFromDrive();
  if(ok){st.textContent=t('driveOk');st.style.color='var(--green)';showToast(t('driveOk'));renderLibrary();renderAdminFolderList();}
  else{st.textContent=t('driveErr');st.style.color='var(--red)';}
}
async function refreshDrive(){
  const st=document.getElementById('driveStatus');
  st.innerHTML=`<span class="spin"></span> Syncing...`;st.style.color='var(--txt3)';
  const ok=await syncFromDrive();
  if(ok){st.textContent=t('driveOk');st.style.color='var(--green)';showToast(t('driveOk'));renderLibrary();renderAdminFolderList();}
  else{st.textContent=t('driveErr');st.style.color='var(--red)';}
}
async function syncFromDrive(){
  if(!driveConfig.folderId||!driveConfig.apiKey)return false;
  const key=driveConfig.apiKey,rootId=driveConfig.folderId;
  const BASE='https://www.googleapis.com/drive/v3/files';
  try{
    const subRes=await fetch(`${BASE}?q='${rootId}'+in+parents+and+mimeType='application/vnd.google-apps.folder'+and+trashed=false&fields=files(id,name,createdTime)&orderBy=createdTime&key=${key}`);
    if(!subRes.ok)return false;
    const subData=await subRes.json();
    const driveFolders=subData.files||[];
    const rootFilesRes=await fetch(`${BASE}?q='${rootId}'+in+parents+and+mimeType+contains+'audio/'+and+trashed=false&fields=files(id,name,createdTime)&orderBy=createdTime&key=${key}`);
    const rootFiles=rootFilesRes.ok?(await rootFilesRes.json()).files||[]:[];
    const driveEntries=[];
    for(const sf of driveFolders){
      const fr=await fetch(`${BASE}?q='${sf.id}'+in+parents+and+mimeType+contains+'audio/'+and+trashed=false&fields=files(id,name,createdTime)&orderBy=createdTime&key=${key}`);
      if(!fr.ok)continue;
      const fd=await fr.json();
      driveEntries.push({name:sf.name,driveId:sf.id,files:fd.files||[]});
    }
    if(rootFiles.length) driveEntries.unshift({name:lang==='ru'?'Общие':'General',driveId:rootId,files:rootFiles});
    if(!driveEntries.length)return true;
    folders=folders.filter(f=>!f.driveSourced);
    for(const entry of driveEntries){
      const tracks=entry.files.map(f=>({id:f.id,name:f.name.replace(/\.[^.]+$/,''),url:`${BASE}/${f.id}?alt=media&key=${key}`,duration:''}));
      folders.push({id:'drive_'+entry.driveId,name:entry.name,days:[],tracks,_open:false,driveSourced:true});
    }
    saveFolders();return true;
  }catch(e){console.error('Drive sync error:',e);return false;}
}
async function maybeAutoSync(){
  if(driveConfig.folderId&&driveConfig.apiKey){await syncFromDrive();renderMain();}
}

  const d=dayId&&f?(f.days||[]).find(x=>x.id===dayId):null;
  document.getElementById('dayNumInput').value=d?d.num||'':'';
  document.getElementById('dayNameInput').value=d?d.name:'';
  openOv('ovDay');setTimeout(()=>document.getElementById('dayNameInput').focus(),300);
}
function saveDay(){
  const num=document.getElementById('dayNumInput').value.trim();
  const name=document.getElementById('dayNameInput').value.trim();
  if(!name)return;
  const f=folders.find(x=>x.id===editingDayFolderId);
  if(!f)return;
  if(!f.days)f.days=[];
  if(editingDayId){const d=f.days.find(x=>x.id===editingDayId);if(d){d.num=num;d.name=name;}}
  else f.days.push({id:uid(),num,name,tracks:[],_open:false});
  saveFolders();closeOv('ovDay');showToast(t('toastSaved'));renderLibrary();
}
function deleteDay(folderId,dayId){
  if(!confirm(lang==='ru'?'Удалить раздел и треки?':'Delete section and tracks?'))return;
  const f=folders.find(x=>x.id===folderId);if(!f)return;
  const i=(f.days||[]).findIndex(x=>x.id===dayId);if(i>=0)f.days.splice(i,1);
  saveFolders();showToast(t('toastDeleted'));renderLibrary();
}

// ═══ UPLOAD ═══════════════════════════════════════════════════
function openUploadModal(folderId,dayId){
  uploadFolderId=folderId;uploadDayId=dayId;pendingFiles=[];
  const f=folders.find(x=>x.id===folderId);
  document.getElementById('uploadTargetLabel').textContent='📁 '+(f?f.name:'');
  document.getElementById('fileQueue').innerHTML='';
  document.getElementById('uploadProg').style.display='none';
  document.getElementById('fileInput').value='';
  document.getElementById('mUploadConfirm').disabled=false;
  // Render day selector chips
  const days=f?f.days||[]:[];
  const opts=document.getElementById('uploadDayOptions');
  const selector=document.getElementById('uploadDaySelector');
  if(days.length){
    selector.style.display='block';
    let chips=`<div class="move-option ${!dayId?'selected':''}" style="padding:6px 12px;border-radius:20px;font-size:12px" onclick="selectUploadDay(null,this)">${t('noSection')}</div>`;
    days.forEach(d=>{
      const label=(d.num?(lang==='ru'?`День ${d.num} — `:`Day ${d.num} — `:'')+d.name);
      chips+=`<div class="move-option ${dayId===d.id?'selected':''}" style="padding:6px 12px;border-radius:20px;font-size:12px" onclick="selectUploadDay('${d.id}',this)">${esc(label)}</div>`;
    });
    opts.innerHTML=chips;
  } else {
    selector.style.display='none';
  }
  openOv('ovUpload');
}
function selectUploadDay(dayId,el){
  uploadDayId=dayId;
  document.querySelectorAll('#uploadDayOptions .move-option').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
}
function onFilesChosen(e){pendingFiles=Array.from(e.target.files);renderFileQueue();}
function renderFileQueue(){
  document.getElementById('fileQueue').innerHTML=pendingFiles.map((f,i)=>`
    <div class="fq-item"><span class="fq-num">${i+1}</span><span class="fq-name">${esc(f.name.replace(/\.[^.]+$/,''))}</span>
    <button class="fq-rm" onclick="pendingFiles.splice(${i},1);renderFileQueue()">✕</button></div>`).join('');
}
async function confirmUpload(){
  if(!pendingFiles.length)return;
  const folder=folders.find(x=>x.id===uploadFolderId);if(!folder)return;
  let targetArr;
  if(uploadDayId){
    const day=(folder.days||[]).find(x=>x.id===uploadDayId);
    if(!day)return;
    if(!day.tracks)day.tracks=[];
    targetArr=day.tracks;
  } else {
    if(!folder.tracks)folder.tracks=[];
    targetArr=folder.tracks;
  }
  const prog=document.getElementById('uploadProg');
  prog.style.display='block';document.getElementById('mUploadConfirm').disabled=true;
  for(let i=0;i<pendingFiles.length;i++){
    const file=pendingFiles[i];
    prog.innerHTML=`<span class="spin"></span>${t('uploading')} ${i+1}/${pendingFiles.length}: ${esc(file.name)}`;
    const blobId=uid();await saveBlob(blobId,file);
    const dur=await audioDur(file);
    targetArr.push({id:uid(),blobId,name:file.name.replace(/\.[^.]+$/,''),duration:fmt(dur)});
  }
  saveFolders();prog.style.display='none';document.getElementById('mUploadConfirm').disabled=false;
  closeOv('ovUpload');showToast(t('toastUploaded'));renderLibrary();renderAdminFolderList();
}
function audioDur(file){return new Promise(res=>{const a=new Audio(),url=URL.createObjectURL(file);a.onloadedmetadata=()=>{URL.revokeObjectURL(url);res(a.duration);};a.onerror=()=>res(0);a.src=url;});}

// ═══ DELETE TRACK ════════════════════════════════════════════
function deleteTrack(folderId,dayId,trackId){
  const folder=folders.find(f=>f.id===folderId);if(!folder)return;
  let arr;
  if(dayId){const day=(folder.days||[]).find(d=>d.id===dayId);if(!day)return;arr=day.tracks||[];}
  else arr=folder.tracks||[];
  const i=arr.findIndex(t=>t.id===trackId);
  if(i>=0){const tr=arr[i];if(tr.blobId)delBlob(tr.blobId);arr.splice(i,1);}
  saveFolders();showToast(t('toastDeleted'));renderLibrary();
}

// ═══ MOVE TRACK ═══════════════════════════════════════════════
function openMoveModal(folderId,dayId,trackId){
  const folder=folders.find(f=>f.id===folderId);if(!folder)return;
  let arr=dayId?(folder.days||[]).find(d=>d.id===dayId)?.tracks||[]:folder.tracks||[];
  const tr=arr.find(t=>t.id===trackId);if(!tr)return;
  moveTrackInfo={folderId,fromDayId:dayId,trackId};moveTargetDayId=undefined;
  document.getElementById('moveTrackName').textContent='🎧 '+tr.name;
  const days=folder.days||[];
  let html='';
  // Option: no section
  html+=`<div class="move-option ${dayId===null?'':''}${moveTargetDayId===null?'selected':''}" onclick="selectMoveTarget(null,this)">
    <span class="move-option-icon">📂</span><span class="move-option-name">${t('noSection')}</span>
  </div>`;
  days.forEach(d=>{
    const label=(d.num?(lang==='ru'?`День ${d.num}`:`Day ${d.num}`)+' — ':'')+d.name;
    const isCurrent=dayId===d.id;
    html+=`<div class="move-option ${isCurrent?'':''}${moveTargetDayId===d.id?'selected':''}" onclick="selectMoveTarget('${d.id}',this)">
      <span class="move-option-icon">📅</span>
      <div><div class="move-option-name">${esc(label)}</div>${isCurrent?`<div class="move-option-sub">${lang==='ru'?'текущий':'current'}</div>`:''}</div>
    </div>`;
  });
  document.getElementById('moveOptions').innerHTML=html;
  openOv('ovMove');
}
function selectMoveTarget(dayId,el){
  moveTargetDayId=dayId;
  document.querySelectorAll('#moveOptions .move-option').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
}
function confirmMove(){
  if(moveTargetDayId===undefined)return;
  const {folderId,fromDayId,trackId}=moveTrackInfo;
  const folder=folders.find(f=>f.id===folderId);if(!folder)return;
  // Get track from source
  let srcArr=fromDayId?(folder.days||[]).find(d=>d.id===fromDayId)?.tracks||[]:folder.tracks||[];
  const ti=srcArr.findIndex(t=>t.id===trackId);if(ti<0)return;
  const [tr]=srcArr.splice(ti,1);
  // Put in target
  let dstArr;
  if(moveTargetDayId){const day=(folder.days||[]).find(d=>d.id===moveTargetDayId);if(!day)return;if(!day.tracks)day.tracks=[];dstArr=day.tracks;}
  else{if(!folder.tracks)folder.tracks=[];dstArr=folder.tracks;}
  dstArr.push(tr);
  saveFolders();closeOv('ovMove');showToast(t('toastMoved'));renderLibrary();
}

// ═══ UTILS ════════════════════════════════════════════════════
function saveFolders(){localStorage.setItem('ag_folders',JSON.stringify(folders));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function openOv(id){document.getElementById(id).classList.add('show');}
function closeOv(id){document.getElementById(id).classList.remove('show');}
document.querySelectorAll('.overlay').forEach(ov=>ov.addEventListener('click',e=>{if(e.target===ov)closeOv(ov.id);}));
let toastT;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2500);}

// ═══ INIT ═════════════════════════════════════════════════════
openDB().then(async()=>{applyLang();renderMain();await maybeAutoSync();});
</script>
